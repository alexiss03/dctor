services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_URL: http://backend:3000/api
    depends_on:
      - backend
    ports:
      - "3001:3000"
